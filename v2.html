<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism — Frame</title>
  <style>
    :root { --accent: #c9a96e; --muted: #444; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #050505; color: #d8d8d8; font-family: Georgia, serif; }

    /* ── Top bar ── */
    .brand {
      position: fixed; top: 0; left: 0; right: 0; height: 50px;
      display: flex; align-items: center; justify-content: center;
      z-index: 20; pointer-events: none;
    }
    .brand span {
      font-size: .78rem; letter-spacing: .46em; text-transform: uppercase;
      color: #3a3a3a;
    }
    .counter {
      position: fixed; top: 18px; left: 28px;
      font-size: .6rem; color: var(--muted); letter-spacing: .3em;
      font-family: sans-serif; text-transform: uppercase; z-index: 20;
    }
    .hint-key {
      position: fixed; top: 18px; right: 28px;
      font-size: .58rem; color: #252525; letter-spacing: .18em;
      font-family: sans-serif; text-transform: uppercase; z-index: 20;
    }

    /* ── Main viewer ── */
    .viewer {
      position: fixed; top: 50px; left: 0; right: 0; bottom: 148px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 80px 0;
    }
    .img-wrap {
      flex: 1; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #main-img {
      max-width: 100%; max-height: 100%; object-fit: contain; display: block;
      box-shadow: 0 22px 65px rgba(0,0,0,.8);
      transition: opacity .2s ease;
    }
    #main-img.fade { opacity: 0; }

    /* ── Info ── */
    .info {
      flex-shrink: 0; text-align: center; padding: 14px 20px 10px;
      min-height: 54px;
    }
    .info-title {
      font-style: italic; font-size: .95rem; color: #ccc;
      letter-spacing: .03em; line-height: 1.4;
    }
    .info-year {
      font-size: .6rem; color: var(--accent); letter-spacing: .32em;
      text-transform: uppercase; font-family: sans-serif; margin-top: 4px;
    }

    /* ── Nav arrows ── */
    .arr {
      position: fixed; top: 50%; margin-top: -22px;
      background: none; border: 1px solid #1c1c1c; color: var(--muted);
      width: 44px; height: 44px; font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; z-index: 20;
    }
    .arr:hover { border-color: var(--accent); color: var(--accent); }
    #btn-prev { left: 14px; }
    #btn-next { right: 14px; }

    /* ── Progress bar ── */
    .progress {
      position: fixed; bottom: 148px; left: 0; right: 0; height: 1px;
      background: #161616; z-index: 20;
    }
    .prog-fill {
      height: 100%; background: var(--accent);
      transition: width .35s cubic-bezier(.25,.46,.45,.94);
    }

    /* ── Filmstrip ── */
    .strip {
      position: fixed; bottom: 0; left: 0; right: 0; height: 148px;
      border-top: 1px solid #111; background: #070707;
      display: flex; align-items: center;
      overflow-x: auto; overflow-y: hidden;
      gap: 3px; padding: 10px 12px;
      scroll-behavior: smooth;
    }
    .strip::-webkit-scrollbar { height: 3px; }
    .strip::-webkit-scrollbar-track { background: transparent; }
    .strip::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .thumb {
      flex-shrink: 0; height: 118px; width: auto;
      cursor: pointer; object-fit: contain;
      opacity: .35; outline: 2px solid transparent; outline-offset: 0;
      transition: opacity .22s, outline-color .22s, transform .22s;
    }
    .thumb:hover   { opacity: .7; }
    .thumb.active  { opacity: 1; outline-color: var(--accent); transform: scaleY(1.04); }

    @media (max-width: 700px) {
      .viewer { padding: 10px 50px 0; }
      .arr    { width: 36px; height: 36px; font-size: 1.1rem; }
      .strip  { height: 100px; }
      .thumb  { height: 78px; }
      .progress { bottom: 100px; }
    }
  </style>
</head>
<body>

<div class="brand"><span>Smartism</span></div>
<span class="counter" id="counter"></span>
<span class="hint-key">← → to navigate</span>

<div class="viewer">
  <div class="img-wrap"><img id="main-img" src="" alt=""></div>
  <div class="info">
    <p class="info-title" id="info-title"></p>
    <p class="info-year"  id="info-year"></p>
  </div>
</div>

<button class="arr" id="btn-prev">&#8249;</button>
<button class="arr" id="btn-next">&#8250;</button>

<div class="progress"><div class="prog-fill" id="prog-fill"></div></div>

<div class="strip" id="strip"></div>

<script>

const data = [

  {y:2008,t:'Bolletje Beschuitweken',                                                  f:'1475068108.png'},
];

let cur = 0;
const mainImg   = document.getElementById('main-img');
const infoTitle = document.getElementById('info-title');
const infoYear  = document.getElementById('info-year');
const counter   = document.getElementById('counter');
const progFill  = document.getElementById('prog-fill');
const strip     = document.getElementById('strip');
let thumbs = [];

/* Build filmstrip */
data.forEach((p, i) => {
  const img = document.createElement('img');
  img.src       = B + p.f;
  img.alt       = p.t;
  img.className = 'thumb';
  img.loading   = 'lazy';
  img.title     = p.t;
  img.addEventListener('click', () => show(i));
  strip.appendChild(img);
  thumbs.push(img);
});

function show(i) {
  cur = i;
  const p = data[i];

  /* update info */
  infoTitle.textContent = p.t;
  infoYear.textContent  = p.y;
  counter.textContent   = `${String(i + 1).padStart(2, '0')} / ${String(data.length).padStart(2, '0')}`;
  progFill.style.width  = `${((i + 1) / data.length) * 100}%`;

  /* fade-swap main image */
  mainImg.classList.add('fade');
  const tmp = new Image();
  tmp.onload = () => { mainImg.src = B + p.f; mainImg.classList.remove('fade'); };
  tmp.src = B + p.f;
  if (tmp.complete) { mainImg.src = B + p.f; mainImg.classList.remove('fade'); }
  mainImg.alt = p.t;

  /* update strip */
  thumbs.forEach((t, j) => t.classList.toggle('active', j === i));

  /* scroll active thumb to center of strip */
  const th = thumbs[i];
  const sw = strip.clientWidth;
  strip.scrollLeft = th.offsetLeft - sw / 2 + th.clientWidth / 2;
}

document.getElementById('btn-prev').addEventListener('click', () => show((cur - 1 + data.length) % data.length));
document.getElementById('btn-next').addEventListener('click', () => show((cur + 1) % data.length));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  show((cur - 1 + data.length) % data.length);
  if (e.key === 'ArrowRight') show((cur + 1) % data.length);
});

show(0);
</script>
</body>
</html>
