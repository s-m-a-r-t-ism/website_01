<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism — Catalogue</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <style>
    :root {
      --bg:     #f7f3ec;
      --text:   #191510;
      --muted:  #a89880;
      --accent: #8b7355;
      --rule:   #ddd5c6;
      --card-bg:#f0ebe2;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html  { scroll-behavior: smooth; }
    body  {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 88px 40px 60px;
      border-bottom: 1px solid var(--rule);
    }
    .h-name {
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 400;
      letter-spacing: .14em;
      color: var(--text);
      line-height: 1;
    }
    .h-rule {
      width: 52px; height: 1px;
      background: var(--accent);
      margin: 28px auto 22px;
    }
    .h-sub {
      font-size: .66rem; letter-spacing: .45em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-style: normal;
    }
    .h-tagline {
      margin-top: 10px;
      font-style: italic; font-size: .88rem;
      color: var(--muted); letter-spacing: .03em;
    }

    /* ── Catalogue grid ── */
    .catalogue {
      max-width: 1380px;
      margin: 0 auto;
      padding: 70px 52px 100px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 64px 44px;
      counter-reset: work;
    }

    /* ── Entry ── */
    .entry {
      cursor: pointer;
      counter-increment: work;
    }

    /* Catalogue number — CSS counter */
    .entry-num {
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .38em;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      text-transform: uppercase;
      margin-bottom: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .entry-num::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--rule);
      flex-shrink: 0;
    }
    .entry-num span { /* injected by JS */ }

    .entry-img {
      overflow: hidden;
      position: relative;
      background: var(--card-bg);
    }
    .entry-img img {
      display: block; width: 100%; height: auto;
      filter: saturate(.85) brightness(.97);
      transition: transform .7s cubic-bezier(.25,.46,.45,.94),
                  filter .5s ease;
    }
    .entry:hover .entry-img img {
      transform: scale(1.035);
      filter: saturate(1.05) brightness(1);
    }

    /* Hover "View" badge */
    .entry-img::after {
      content: 'View';
      position: absolute; top: 14px; right: 14px;
      background: rgba(247,243,236,.88);
      color: var(--accent);
      font-size: .6rem; letter-spacing: .22em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 4px 9px; border: 1px solid var(--rule);
      opacity: 0; transition: opacity .3s;
    }
    .entry:hover .entry-img::after { opacity: 1; }

    .entry-caption {
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid var(--rule);
    }
    .entry-title {
      font-style: italic;
      font-size: .9rem;
      line-height: 1.5;
      color: var(--text);
    }
    .entry-meta {
      margin-top: 7px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .entry-year {
      font-size: .58rem; color: var(--accent);
      letter-spacing: .28em; text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .entry-medium {
      font-size: .56rem; color: #c0b5a4;
      letter-spacing: .12em; font-style: italic;
    }

    /* ── Lightbox (dark over light page) ── */
    #lb {
      display: none; position: fixed; inset: 0;
      background: rgba(6,5,4,.97); z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 60px 72px 68px;
    }
    #lb.open { display: flex; }
    #lb-wrap {
      flex: 1; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #lb-img {
      max-width: 100%; max-height: 100%; object-fit: contain; display: block;
      box-shadow: 0 28px 80px rgba(0,0,0,.88);
      transition: opacity .2s;
    }
    #lb-img.fade { opacity: 0; }
    .lb-info { text-align: center; padding-top: 20px; flex-shrink: 0; }
    .lb-title {
      font-style: italic; font-size: 1.05rem; color: #e8e8e8;
    }
    .lb-year {
      font-size: .6rem; color: #c9a96e; letter-spacing: .32em;
      text-transform: uppercase; margin-top: 7px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    #lb-close {
      position: fixed; top: 18px; right: 22px; background: none; border: none;
      color: #444; font-size: 2rem; cursor: pointer; transition: color .2s, transform .2s;
    }
    #lb-close:hover { color: #fff; transform: rotate(90deg); }
    #lb-count {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      font-size: .62rem; color: #333; letter-spacing: .3em;
      font-family: sans-serif; text-transform: uppercase;
    }
    .lb-arr {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid #1c1c1c; color: #444;
      width: 46px; height: 46px; font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .lb-arr:hover { border-color: #c9a96e; color: #c9a96e; }
    #lb-prev { left: 14px; }
    #lb-next { right: 14px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 52px 20px 64px;
      border-top: 1px solid var(--rule);
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .foot-rule { width: 36px; height: 1px; background: var(--accent); margin: 0 auto 22px; }
    footer p { font-size: .65rem; color: var(--muted); letter-spacing: .28em; text-transform: uppercase; }
    footer a  { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .catalogue { padding: 40px 20px 60px; gap: 48px 24px; }
      header     { padding: 60px 20px 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1 class="h-name">Smartism</h1>
  <div class="h-rule"></div>
  <p class="h-sub">A Catalogue of Original Works</p>
  <p class="h-tagline">Fifty-five paintings, 2008–2017</p>
</header>

<div class="catalogue" id="catalogue"></div>

<div id="lb">
  <button id="lb-close">×</button>
  <span id="lb-count"></span>
  <button class="lb-arr" id="lb-prev">&#8249;</button>
  <button class="lb-arr" id="lb-next">&#8250;</button>
  <div id="lb-wrap"><img id="lb-img" src="" alt=""></div>
  <div class="lb-info">
    <p class="lb-title" id="lb-title"></p>
    <p class="lb-year"  id="lb-year"></p>
  </div>
</div>

<footer>
  <div class="foot-rule"></div>
  <p>For inquiries: <a href="tel:+31623140683">+31 6 23140683</a></p>
</footer>

<script>

const data = [

  {y:2008,t:'Bolletje Beschuitweken',                                                  f:'1475068108.png'},
];

/* ── Build catalogue ── */
const cat   = document.getElementById('catalogue');
const cards = [];
data.forEach((p, i) => {
  const entry = document.createElement('div');
  entry.className = 'entry';
  const num = String(i + 1).padStart(2, '0');
  entry.innerHTML = `
    <div class="entry-num"><span>${num}</span></div>
    <div class="entry-img">
      <img src="${B + p.f}" alt="${p.t}" loading="lazy" decoding="async">
    </div>
    <div class="entry-caption">
      <p class="entry-title">${p.t}</p>
      <div class="entry-meta">
        <span class="entry-year">${p.y}</span>
        <span class="entry-medium">oil on canvas</span>
      </div>
    </div>`;
  entry.addEventListener('click', () => openLb(i));
  cat.appendChild(entry);
  cards.push(entry);
});

/* ── Lightbox ── */
const lb    = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbT   = document.getElementById('lb-title');
const lbY   = document.getElementById('lb-year');
const lbC   = document.getElementById('lb-count');
let cur = 0;

function lbLoad(i) {
  cur = i;
  lbImg.classList.add('fade');
  const tmp = new Image();
  tmp.onload = () => { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); };
  tmp.src = B + data[i].f;
  if (tmp.complete) { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); }
  lbT.textContent = data[i].t;
  lbY.textContent = data[i].y;
  lbC.textContent = `${i + 1} / ${data.length}`;
}
function openLb(i) { lbLoad(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur - 1 + data.length) % data.length);
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur + 1) % data.length);
});
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  lbLoad((cur - 1 + data.length) % data.length);
  if (e.key === 'ArrowRight') lbLoad((cur + 1) % data.length);
});
</script>
</body>
</html>
