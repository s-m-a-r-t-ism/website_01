<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky:  #00d4ff;
      --blue: #4080ff;
      --dim:  rgba(0,212,255,.25);
      --text: #b8d8f0;
      --bright: #e8f4ff;
      --card-bg: rgba(4, 18, 38, 0.88);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(ellipse 85% 55% at 15% 18%, rgba(32,6,72,.52)   0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% 82%, rgba(0,20,58,.55)   0%, transparent 58%),
        radial-gradient(ellipse 55% 65% at 55% 48%, rgba(4,10,28,.85)   0%, transparent 72%),
        #03080f;
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Starfield canvas ── */
    #stars {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Cosmic dust canvas ── */
    #dust {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Deep space nebula clouds ── */
    .nebula-layer {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .nb { position: absolute; border-radius: 50%; }

    /* Deep violet — upper left */
    .nb1 {
      width: 88vw; height: 68vh; top: -28vh; left: -28vw;
      background: radial-gradient(ellipse, rgba(52,8,115,.24)  0%, transparent 68%);
      filter: blur(90px);
      animation: nb1 42s ease-in-out infinite alternate;
    }
    /* Dark teal — lower right */
    .nb2 {
      width: 68vw; height: 78vh; bottom: -28vh; right: -22vw;
      background: radial-gradient(ellipse, rgba(0,80,105,.22)  0%, transparent 65%);
      filter: blur(110px);
      animation: nb2 55s ease-in-out infinite alternate;
    }
    /* Deep indigo — upper right */
    .nb3 {
      width: 58vw; height: 62vh; top: -12vh; right: -12vw;
      background: radial-gradient(ellipse, rgba(28,8,88,.20)   0%, transparent 65%);
      filter: blur(100px);
      animation: nb3 47s ease-in-out infinite alternate;
    }
    /* Purple-magenta — mid left */
    .nb4 {
      width: 48vw; height: 58vh; top: 22vh; left: -8vw;
      background: radial-gradient(ellipse, rgba(70,5,58,.16)   0%, transparent 65%);
      filter: blur(95px);
      animation: nb4 36s ease-in-out infinite alternate;
    }
    /* Cosmic teal — lower left */
    .nb5 {
      width: 78vw; height: 48vh; bottom: 2vh; left: -18vw;
      background: radial-gradient(ellipse, rgba(0,105,90,.14)  0%, transparent 65%);
      filter: blur(120px);
      animation: nb5 62s ease-in-out infinite alternate;
    }
    /* Blue-indigo — center deep */
    .nb6 {
      width: 52vw; height: 52vh; top: 32vh; left: 22vw;
      background: radial-gradient(ellipse, rgba(12,28,95,.18)  0%, transparent 65%);
      filter: blur(130px);
      animation: nb6 70s ease-in-out infinite alternate;
    }
    @keyframes nb1 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(6vw,8vh)   scale(1.12)} }
    @keyframes nb2 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(-7vw,-6vh) scale(1.08)} }
    @keyframes nb3 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(-5vw,7vh)  scale(1.10)} }
    @keyframes nb4 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(8vw,-4vh)  scale(1.15)} }
    @keyframes nb5 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(5vw,-5vh)  scale(1.06)} }
    @keyframes nb6 { 0%{transform:translate(0,0) scale(1)}     100%{transform:translate(-4vw,6vh)  scale(1.20)} }

    /* ── Holographic grid ── */
    .space-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px);
      background-size: 55px 55px;
    }

    /* ── Global radar sweep ── */
    .radar-sweep {
      position: fixed; top: 0; left: 0; right: 0;
      height: 1px; z-index: 9990; pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,.7) 50%, transparent 100%);
      animation: radar 10s linear infinite;
    }
    @keyframes radar {
      0%   { top: -2px; opacity: 0; }
      3%   { opacity: 1; }
      95%  { opacity: .2; }
      100% { top: 100vh; opacity: 0; }
    }

    /* All content above bg layers */
    header, .gallery, #lb, footer, .hud-bar { position: relative; z-index: 1; }

    /* ═══════════════════════════════════
       HEADER
    ═══════════════════════════════════ */
    header {
      text-align: center;
      padding: 100px 20px 70px;
      border-bottom: 1px solid var(--dim);
      position: relative;
      overflow: hidden;
    }

    /* Corner HUD marks */
    header::before, header::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      top: 24px;
      border-top: 1px solid var(--sky);
    }
    header::before { left: 28px;  border-left:  1px solid var(--sky); }
    header::after  { right: 28px; border-right: 1px solid var(--sky); }

    .h-eyebrow {
      font-family: 'Orbitron', monospace;
      font-size: .58rem;
      letter-spacing: .45em;
      text-indent: .45em;
      color: var(--sky);
      text-transform: uppercase;
      opacity: .65;
      margin-bottom: 26px;
    }

    .h-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: .2em;
      text-indent: .2em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--bright);
      text-shadow:
        0 0 30px rgba(0,212,255,.4),
        0 0 80px rgba(0,212,255,.15);
      animation: title-glow 5s ease-in-out infinite alternate;
    }
    @keyframes title-glow {
      0%   { text-shadow: 0 0 20px rgba(0,212,255,.3), 0 0 60px rgba(0,212,255,.1); }
      100% { text-shadow: 0 0 40px rgba(0,212,255,.6), 0 0 100px rgba(0,212,255,.25); }
    }

    .h-rule {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--sky), transparent);
      margin: 28px auto 24px;
      box-shadow: 0 0 12px var(--sky);
    }

    .h-sub {
      font-family: 'Orbitron', monospace;
      font-size: .75rem;
      font-weight: 400;
      letter-spacing: .55em;
      text-indent: .55em;
      text-transform: uppercase;
      color: var(--sky);
      opacity: .8;
    }

    .h-meta {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 28px;
    }
    .h-meta span {
      font-size: .52rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(0,212,255,.35);
      font-family: 'Orbitron', monospace;
    }
    .h-meta span b {
      color: rgba(0,212,255,.6);
      font-weight: 400;
    }

    /* ═══════════════════════════════════
       HUD status bar
    ═══════════════════════════════════ */
    .hud-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      border-bottom: 1px solid rgba(0,212,255,.1);
      background: rgba(2,12,26,.8);
      font-family: 'Orbitron', monospace;
      font-size: .48rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(0,212,255,.3);
      backdrop-filter: blur(8px);
    }
    .hud-bar .hud-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--sky);
      margin-right: 7px;
      box-shadow: 0 0 6px var(--sky);
      animation: dot-pulse 2s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%  { opacity: .2; }
    }

    /* ═══════════════════════════════════
       GALLERY
    ═══════════════════════════════════ */
    .gallery {
      max-width: 1040px;
      margin: 0 auto;
      padding: 72px 28px 100px;
      columns: 2 380px;
      column-gap: 22px;
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      margin-bottom: 22px;
      cursor: pointer;
    }

    /* Float + scan phase per card — fully desynchronised */
    .card:nth-child(4n+1) { --fd: 9s;   --fdy: -10px; --fp: 0s;    --sd: 11s; --sp: 0s;    }
    .card:nth-child(4n+2) { --fd: 12s;  --fdy: -7px;  --fp: -3.2s; --sd: 13s; --sp: -4.2s; }
    .card:nth-child(4n+3) { --fd: 7.5s; --fdy: -13px; --fp: -5.1s; --sd:  9s; --sp: -7.1s; }
    .card:nth-child(4n)   { --fd: 14s;  --fdy: -9px;  --fp: -1.8s; --sd: 15s; --sp: -2.8s; }

    .card-inner {
      opacity: 0;
      transform: translateY(28px) scale(.98);
      transition: opacity .9s ease, transform .9s ease;
      background: var(--card-bg);
      border: 1px solid rgba(0,212,255,.2);
      box-shadow:
        0 0 8px rgba(0,212,255,.1),
        0 4px 30px rgba(0,0,0,.6),
        inset 0 0 20px rgba(0,212,255,.02);
      position: relative;
      backdrop-filter: blur(4px);
    }

    /* Fade-in + float once visible */
    .card.in .card-inner {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation:
        card-float var(--fd,6s) ease-in-out infinite var(--fp,0s),
        card-glow  4s ease-in-out infinite var(--fp,0s);
    }

    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(var(--fdy,-7px)); }
    }

    @keyframes card-glow {
      0%, 100% {
        box-shadow:
          0 0 8px  rgba(0,212,255,.18),
          0 0 22px rgba(0,212,255,.06),
          0 4px 28px rgba(0,0,0,.60),
          inset 0 0 18px rgba(0,212,255,.03);
        border-color: rgba(0,212,255,.22);
      }
      40% {
        box-shadow:
          0 0 22px rgba(0,212,255,.42),
          0 0 55px rgba(0,212,255,.16),
          0 4px 38px rgba(0,0,0,.70),
          inset 0 0 30px rgba(0,212,255,.08);
        border-color: rgba(0,212,255,.60);
      }
      70% {
        box-shadow:
          0 0 14px rgba(110,80,255,.30),
          0 0 38px rgba(110,80,255,.12),
          0 4px 32px rgba(0,0,0,.65),
          inset 0 0 24px rgba(110,80,255,.05);
        border-color: rgba(130,100,255,.44);
      }
    }

    /* Hover: arrest float, boost glow */
    .card:hover .card-inner {
      animation-play-state: paused;
      border-color: rgba(0,212,255,.7);
      box-shadow:
        0 0 24px rgba(0,212,255,.4),
        0 0 60px rgba(0,212,255,.15),
        0 8px 40px rgba(0,0,0,.7),
        inset 0 0 30px rgba(0,212,255,.07);
      transform: translateY(-4px) scale(1.005) !important;
    }

    /* Corner marks */
    .card-inner::before {
      content: '';
      position: absolute; top: 0; left: 0; z-index: 4; pointer-events: none;
      width: 16px; height: 16px;
      border-top: 1px solid rgba(0,212,255,.6);
      border-left: 1px solid rgba(0,212,255,.6);
    }
    .card-inner::after {
      content: '';
      position: absolute; bottom: 0; right: 0; z-index: 4; pointer-events: none;
      width: 16px; height: 16px;
      border-bottom: 1px solid rgba(0,212,255,.6);
      border-right: 1px solid rgba(0,212,255,.6);
    }

    /* ── IMAGE ── */
    .card-img {
      position: relative;
      overflow: hidden;
    }

    .card-img img {
      display: block; width: 100%; height: auto;
      filter: brightness(.85) contrast(1.05) saturate(.88);
      transition: filter .5s ease, transform .6s ease;
    }
    .card:hover .card-img img {
      filter: brightness(.98) contrast(1.08) saturate(1.05);
      transform: scale(1.03);
    }

    /* Ambient scan-line — always sweeping, staggered per card */
    .card-img::before {
      content: '';
      position: absolute;
      top: -3px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,.55) 50%, transparent 100%);
      z-index: 3; pointer-events: none;
      animation: ambient-scan var(--sd, 11s) linear infinite var(--sp, 0s);
    }
    .card:hover .card-img::before {
      background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,.95) 50%, transparent 100%);
      animation-duration: 2.5s;
    }
    @keyframes ambient-scan {
      0%   { top: -3px;          opacity: 0;  }
      6%   {                     opacity: .75; }
      88%  {                     opacity: .35; }
      96%  {                     opacity: 0;  }
      100% { top: calc(100% + 3px); opacity: 0; }
    }

    /* Targeting reticle — 4 corner brackets on image frame */
    .reticle {
      position: absolute; inset: 0;
      z-index: 4; pointer-events: none;
    }
    .reticle span {
      position: absolute;
      width: 14px; height: 14px;
      animation: reticle-glow 4s ease-in-out infinite;
    }
    .r-tl { top: 7px;    left: 7px;
      border-top:    1px solid rgba(0,212,255,.85);
      border-left:   1px solid rgba(0,212,255,.85); }
    .r-tr { top: 7px;    right: 7px;
      border-top:    1px solid rgba(0,212,255,.85);
      border-right:  1px solid rgba(0,212,255,.85);
      animation-delay: -1s; }
    .r-bl { bottom: 7px; left: 7px;
      border-bottom: 1px solid rgba(0,212,255,.85);
      border-left:   1px solid rgba(0,212,255,.85);
      animation-delay: -2s; }
    .r-br { bottom: 7px; right: 7px;
      border-bottom: 1px solid rgba(0,212,255,.85);
      border-right:  1px solid rgba(0,212,255,.85);
      animation-delay: -3s; }
    @keyframes reticle-glow {
      0%, 100% { opacity: .45; }
      50%      { opacity: 1;   filter: drop-shadow(0 0 4px rgba(0,212,255,.8)); }
    }

    /* Overlay vignette */
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(2,12,26,.55) 0%,
        rgba(2,12,26,.05) 40%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* ── CAPTION ── */
    .card-caption {
      padding: 14px 16px 18px;
      border-top: 1px solid rgba(0,212,255,.08);
    }

    /* Sci-fi data readouts below image */
    .card-data {
      display: flex;
      flex-wrap: wrap;
      gap: 3px 10px;
      padding: 7px 14px 4px;
      border-top: 1px solid rgba(0,212,255,.07);
    }
    .card-data span {
      font-family: 'Orbitron', monospace;
      font-size: .33rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(0,212,255,.38);
      animation: data-tick 5s ease-in-out infinite;
    }
    .card-data span:nth-child(1) { animation-delay:    0s; }
    .card-data span:nth-child(2) { animation-delay: -1.3s; color: rgba(80,255,190,.30); }
    .card-data span:nth-child(3) { animation-delay: -2.6s; }
    .card-data span:nth-child(4) { animation-delay: -3.9s; color: rgba(80,255,190,.32); }
    @keyframes data-tick {
      0%, 78%, 100% { opacity: .80; }
      81%           { opacity: .18; }
      83%           { opacity: 1;   }
      85%           { opacity: .32; }
      87%           { opacity: .88; }
    }

    .catalog-num {
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: .72rem;
      letter-spacing: .22em;
      color: rgba(0,212,255,.85);
      margin-bottom: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0,212,255,.5), 0 0 22px rgba(0,212,255,.2);
      animation: artifact-pulse 6s ease-in-out infinite;
    }
    @keyframes artifact-pulse {
      0%, 100% { color: rgba(0,212,255,.70); text-shadow: 0 0 8px rgba(0,212,255,.4); }
      50%      { color: rgba(110,225,255,.98); text-shadow: 0 0 16px rgba(0,212,255,.75), 0 0 34px rgba(0,212,255,.30); }
    }

    .card-title {
      display: block;
      font-size: .85rem;
      font-weight: 400;
      color: var(--bright);
      letter-spacing: .04em;
      line-height: 1.5;
    }

    .card-year {
      display: inline-block;
      margin-top: 7px;
      font-family: 'Orbitron', monospace;
      font-size: .5rem;
      font-weight: 400;
      color: var(--sky);
      letter-spacing: .3em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid rgba(0,212,255,.25);
      background: rgba(0,212,255,.05);
    }

    /* ═══════════════════════════════════
       LIGHTBOX
    ═══════════════════════════════════ */
    #lb {
      display: none; position: fixed; inset: 0;
      background: rgba(1,8,20,.97);
      z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column;
      padding: 60px 80px 60px;
      border: 1px solid rgba(0,212,255,.1);
    }
    #lb.open { display: flex; animation: lb-in .3s ease; }

    @keyframes lb-in {
      0%   { opacity: 0; filter: brightness(2) blur(10px); }
      100% { opacity: 1; filter: none; }
    }

    #lb-wrap {
      flex: 1; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    #lb-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      border: 1px solid rgba(0,212,255,.2);
      box-shadow:
        0 0 40px rgba(0,212,255,.2),
        0 0 100px rgba(0,100,200,.15),
        0 30px 80px rgba(0,0,0,.9);
      transition: opacity .2s;
    }
    #lb-img.fade { opacity: 0; }

    .lb-info { text-align: center; padding-top: 22px; flex-shrink: 0; }
    .lb-title {
      font-size: 1rem; font-weight: 400;
      color: var(--bright);
      letter-spacing: .05em;
    }
    .lb-year {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: .55rem;
      color: var(--sky);
      letter-spacing: .35em;
      text-transform: uppercase;
      margin-top: 10px;
      padding: 3px 12px;
      border: 1px solid rgba(0,212,255,.3);
      background: rgba(0,212,255,.05);
    }

    #lb-close {
      position: fixed; top: 18px; right: 22px;
      background: rgba(0,212,255,.05);
      border: 1px solid rgba(0,212,255,.3);
      color: rgba(0,212,255,.5);
      font-size: 1.5rem; cursor: pointer;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; z-index: 10;
      font-family: 'Orbitron', monospace;
    }
    #lb-close:hover {
      color: var(--sky); border-color: var(--sky);
      box-shadow: 0 0 16px rgba(0,212,255,.5);
      transform: rotate(90deg);
    }

    #lb-count {
      position: fixed; top: 26px; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: .52rem; color: rgba(0,212,255,.35);
      letter-spacing: .3em; text-transform: uppercase;
    }

    .lb-arr {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(0,212,255,.04);
      border: 1px solid rgba(0,212,255,.2);
      color: rgba(0,212,255,.4);
      width: 46px; height: 46px; font-size: 1.5rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .25s;
    }
    .lb-arr:hover {
      border-color: var(--sky); color: var(--sky);
      box-shadow: 0 0 18px rgba(0,212,255,.4);
    }
    #lb-prev { left: 14px; }
    #lb-next { right: 14px; }

    /* ═══════════════════════════════════
       FOOTER
    ═══════════════════════════════════ */
    footer {
      text-align: center;
      padding: 48px 20px 60px;
      border-top: 1px solid rgba(0,212,255,.1);
    }

    .foot-rule {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--sky), transparent);
      margin: 0 auto 22px;
      box-shadow: 0 0 10px rgba(0,212,255,.5);
    }

    footer p {
      font-family: 'Orbitron', monospace;
      font-size: .55rem; color: rgba(0,212,255,.25);
      letter-spacing: .28em; text-transform: uppercase;
    }
    footer a { color: rgba(0,212,255,.4); text-decoration: none; transition: all .2s; }
    footer a:hover { color: var(--sky); text-shadow: 0 0 10px var(--sky); }

    .foot-coords {
      margin-top: 10px;
      font-size: .46rem; color: rgba(0,212,255,.15);
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .gallery { columns: 1; padding: 50px 14px 70px; }
      header   { padding: 70px 14px 50px; }
      #lb      { padding: 50px 30px 50px; }
      .lb-arr  { display: none; }
      .h-meta  { gap: 16px; flex-wrap: wrap; justify-content: center; }
      .hud-bar .hud-right { display: none; }
    }
  </style>
</head>

<!-- Starfield -->

/* ══════════════════════════════════════
   STARFIELD — 3-layer + shooting stars
══════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  /* Layer configs: tiny distant / medium / large bright */
  const LAYERS = [
    { count: 330, rMin: .08, rMax: .42, aMin: .03, aMax: .30, spd: .0010 },
    { count: 100, rMin: .38, rMax: 1.05, aMin: .10, aMax: .62, spd: .0024 },
    { count:  24, rMin: .95, rMax: 2.20, aMin: .32, aMax: .90, spd: .0035 },
  ];

  /* Realistic stellar colour distribution */
  function starHue() {
    const r = Math.random();
    if (r < .12) return 'rgba(165,210,255,';   /* blue-white O/B  */
    if (r < .20) return 'rgba(255,250,215,';   /* warm F/G        */
    if (r < .26) return 'rgba(205,228,255,';   /* cool white A    */
    if (r < .30) return 'rgba(255,205,185,';   /* faint orange K  */
    return 'rgba(222,234,255,';                /* neutral white   */
  }

  class Star {
    constructor(layer) { this.layer = layer; this.reset(); }
    reset() {
      const L    = LAYERS[this.layer];
      this.x     = Math.random() * canvas.width;
      this.y     = Math.random() * canvas.height;
      this.r     = L.rMin + Math.random() * (L.rMax - L.rMin);
      this.alpha = L.aMin + Math.random() * (L.aMax - L.aMin);
      this.dir   = Math.random() > .5 ? 1 : -1;
      this.speed = L.spd * (.55 + Math.random() * .9);
      this.drift = (Math.random() - .5) * .016;
      this.hue   = starHue();
    }
    tick() {
      const L = LAYERS[this.layer];
      this.alpha += this.dir * this.speed;
      if (this.alpha > L.aMax || this.alpha < L.aMin) this.dir *= -1;
      this.x += this.drift;
      if (this.x < -2 || this.x > canvas.width + 2) this.drift *= -1;
    }
    draw() {
      const a = Math.max(0, this.alpha);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.hue + a.toFixed(3) + ')';
      ctx.fill();
      /* diffraction cross on large bright stars */
      if (this.layer === 2 && this.r > 1.4) {
        const spike = this.r * 5.5;
        ctx.save();
        ctx.globalAlpha = a * .32;
        ctx.strokeStyle = this.hue + '1)';
        ctx.lineWidth   = .4;
        ctx.beginPath();
        ctx.moveTo(this.x - spike, this.y); ctx.lineTo(this.x + spike, this.y);
        ctx.moveTo(this.x, this.y - spike); ctx.lineTo(this.x, this.y + spike);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  const stars = LAYERS.flatMap((_, li) =>
    Array.from({ length: LAYERS[li].count }, () => new Star(li))
  );

  /* ── Shooting stars ── */
  let sTimer = 280 + Math.random() * 320;
  let shoot  = null;

  function spawnShoot() {
    shoot = {
      x:     Math.random() * canvas.width  * .72,
      y:     Math.random() * canvas.height * .30,
      angle: (20 + Math.random() * 30) * Math.PI / 180,
      speed: 13 + Math.random() * 11,
      len:   65 + Math.random() * 100,
      alpha: 1,
    };
  }

  function tickShoot() {
    if (--sTimer <= 0 && !shoot) {
      spawnShoot();
      sTimer = 420 + Math.random() * 720;
    }
    if (!shoot) return;
    shoot.x += Math.cos(shoot.angle) * shoot.speed;
    shoot.y += Math.sin(shoot.angle) * shoot.speed;
    shoot.alpha -= .020;
    if (shoot.alpha <= 0 || shoot.x > canvas.width + 60) { shoot = null; return; }
    const tx = shoot.x - Math.cos(shoot.angle) * shoot.len;
    const ty = shoot.y - Math.sin(shoot.angle) * shoot.len;
    const g  = ctx.createLinearGradient(tx, ty, shoot.x, shoot.y);
    g.addColorStop(0,   'rgba(180,220,255,0)');
    g.addColorStop(.65, `rgba(220,238,255,${(shoot.alpha * .45).toFixed(3)})`);
    g.addColorStop(1,   `rgba(255,255,255,${shoot.alpha.toFixed(3)})`);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(shoot.x, shoot.y);
    ctx.strokeStyle = g;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => { s.tick(); s.draw(); });
    tickShoot();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => { resize(); stars.forEach(s => s.reset()); });
  resize(); frame();
})();

/* ══════════════════════════════════════
   COSMIC DUST — slow-drifting micro-motes
══════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('dust');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  class Mote {
    constructor() { this.reset(true); }
    reset(init) {
      this.x     = Math.random() * canvas.width;
      this.y     = init ? Math.random() * canvas.height : -1;
      this.r     = Math.random() * .52 + .06;
      this.alpha = Math.random() * .11 + .015;
      this.vx    = (Math.random() - .44) * .048 + .016;  /* slight rightward */
      this.vy    = Math.random() * .035 + .005;           /* gently downward  */
      this.phase = Math.random() * Math.PI * 2;
      this.pulse = Math.random() * .007 + .003;
    }
    tick() {
      this.x     += this.vx;
      this.y     += this.vy;
      this.phase += this.pulse;
      if (this.x > canvas.width + 2 || this.y > canvas.height + 2) this.reset(false);
    }
    draw() {
      const a = this.alpha * (.6 + .4 * Math.sin(this.phase));
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(185,218,255,${a.toFixed(3)})`;
      ctx.fill();
    }
  }

  const motes = Array.from({ length: 500 }, () => new Mote());

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    motes.forEach(m => { m.tick(); m.draw(); });
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => { resize(); motes.forEach(m => m.reset(true)); });
  resize(); frame();
})();

/* ── Scroll fade-in ── */
const io = new IntersectionObserver(entries => {
  entries.forEach((e, idx) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('in'), idx * 65);
      io.unobserve(e.target);
    }
  });
}, { threshold: .05, rootMargin: '0px 0px -30px 0px' });
cards.forEach(c => io.observe(c));

/* ── Lightbox ── */
const lb    = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbT   = document.getElementById('lb-title');
const lbY   = document.getElementById('lb-year');
const lbC   = document.getElementById('lb-count');
let cur = 0;

function lbLoad(i) {
  cur = i;
  lbImg.classList.add('fade');
  const tmp = new Image();
  tmp.onload = () => { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); };
  tmp.src = B + data[i].f;
  if (tmp.complete) { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); }
  lbT.textContent = data[i].t;
  lbY.textContent = data[i].y;
  lbC.textContent = `${i + 1} / ${data.length}`;
}
function openLb(i)  { lbLoad(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur - 1 + data.length) % data.length);
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur + 1) % data.length);
});
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  lbLoad((cur - 1 + data.length) % data.length);
  if (e.key === 'ArrowRight') lbLoad((cur + 1) % data.length);
});
