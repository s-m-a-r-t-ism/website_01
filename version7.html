<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      overflow-x: hidden;
    }

    /* ── Animated background color drift ── */
    .bg-drift {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 18% 28%, rgba(255,0,255,.07) 0%, transparent 100%),
        radial-gradient(ellipse 45% 55% at 82% 72%, rgba(0,255,255,.07) 0%, transparent 100%),
        radial-gradient(ellipse 40% 60% at 52% 52%, rgba(57,255,20,.05) 0%, transparent 100%);
      filter: blur(60px);
      animation: bg-drift 16s ease-in-out infinite alternate, hue-cycle 25s linear infinite;
    }

    @keyframes bg-drift {
      0%   { transform: scale(1)    translateX(0)    translateY(0);    }
      25%  { transform: scale(1.12) translateX(6%)   translateY(-4%);  }
      50%  { transform: scale(.92)  translateX(-5%)  translateY(6%);   }
      75%  { transform: scale(1.08) translateX(4%)   translateY(5%);   }
      100% { transform: scale(1.04) translateX(-3%)  translateY(-6%);  }
    }

    @keyframes hue-cycle {
      0%   { filter: blur(60px) hue-rotate(0deg);   }
      100% { filter: blur(60px) hue-rotate(360deg); }
    }

    /* ── CRT scanlines ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.14) 2px, rgba(0,0,0,.14) 4px
      );
    }

    /* ── Animated film grain / static noise ── */
    .noise-svg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 9997; pointer-events: none;
    }

    /* ── CRT vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 9996; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,.75) 100%);
    }

    /* ── All content sits above bg-drift ── */
    header, .gallery, #lb, footer { position: relative; z-index: 1; }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    header {
      text-align: center;
      padding: 100px 20px 72px;
      border-bottom: 1px solid #ff00ff33;
      overflow: hidden;
    }

    /* ── Title: always glitching, always shaking ── */
    .h-name {
      position: relative;
      font-size: clamp(3.2rem, 10vw, 9.5rem);
      font-weight: 700;
      letter-spacing: .3em;
      text-indent: .3em;
      text-transform: uppercase;
      line-height: 1;
      color: #ff00ff;
      text-shadow:
        0 0 10px #ff00ff,
        0 0 30px #ff00ff99,
        0 0 70px #ff00ff55;
      /* Flicker + continuous shake */
      animation: hdr-flicker 6s infinite, title-shake .45s steps(6) infinite;
    }

    @keyframes hdr-flicker {
      0%, 91%, 93%, 95%, 100% { opacity: 1; }
      92%  { opacity: .15; }
      94%  { opacity: .7;  }
      96%  { opacity: .05; }
    }

    /* Shake: skew + translate running ALL the time */
    @keyframes title-shake {
      0%   { transform: translate(0,0)        skewX(0deg)   scaleX(1);    }
      12%  { transform: translate(-5px,1px)   skewX(-4deg)  scaleX(.99);  }
      24%  { transform: translate(5px,-2px)   skewX(4deg)   scaleX(1.01); }
      36%  { transform: translate(-2px,2px)   skewX(0deg)   scaleX(1);    }
      48%  { transform: translate(4px,-1px)   skewX(2deg)   scaleX(.98);  }
      60%  { transform: translate(-6px,0px)   skewX(-3deg)  scaleX(1.02); }
      72%  { transform: translate(3px,2px)    skewX(3deg)   scaleX(1);    }
      84%  { transform: translate(-3px,-2px)  skewX(-2deg)  scaleX(1);    }
      100% { transform: translate(0,0)        skewX(0deg)   scaleX(1);    }
    }

    /* Glitch layer A — cyan — ALWAYS slicing */
    .h-name::before {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; right: 0; text-indent: .3em;
      color: #00ffff;
      text-shadow: 0 0 12px #00ffff;
      animation: glitch-a 1.3s steps(1) infinite;
    }

    /* Glitch layer B — acid green — ALWAYS slicing */
    .h-name::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; right: 0; text-indent: .3em;
      color: #39ff14;
      text-shadow: 0 0 12px #39ff14;
      animation: glitch-b 1.9s steps(1) infinite .3s;
    }

    /* Both animations run continuously — no "hiding" phase */
    @keyframes glitch-a {
      0%   { clip-path: inset(60% 0  5% 0); transform: translate(8px);  }
      14%  { clip-path: inset(10% 0 65% 0); transform: translate(-8px); }
      28%  { clip-path: inset(82% 0  2% 0); transform: translate(5px);  }
      42%  { clip-path: inset(33% 0 44% 0); transform: translate(-5px); }
      56%  { clip-path: inset(2%  0 82% 0); transform: translate(9px);  }
      70%  { clip-path: inset(50% 0 26% 0); transform: translate(-9px); }
      84%  { clip-path: inset(22% 0 58% 0); transform: translate(6px);  }
      100% { clip-path: inset(60% 0  5% 0); transform: translate(8px);  }
    }

    @keyframes glitch-b {
      0%   { clip-path: inset(25% 0 58% 0); transform: translate(-7px); }
      16%  { clip-path: inset(72% 0  8% 0); transform: translate(7px);  }
      32%  { clip-path: inset(8%  0 74% 0); transform: translate(-6px); }
      48%  { clip-path: inset(46% 0 30% 0); transform: translate(6px);  }
      64%  { clip-path: inset(88% 0  2% 0); transform: translate(-8px); }
      80%  { clip-path: inset(15% 0 68% 0); transform: translate(8px);  }
      100% { clip-path: inset(25% 0 58% 0); transform: translate(-7px); }
    }

    /* ── Header rule ── */
    .h-rule {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      margin: 30px auto 22px;
      box-shadow: 0 0 14px #ff00ff99;
      animation: rule-pulse 3s ease-in-out infinite alternate;
    }
    @keyframes rule-pulse {
      0%   { box-shadow: 0 0 8px #ff00ff66;  width: 60px;  }
      100% { box-shadow: 0 0 24px #ff00ffcc; width: 80px;  }
    }

    /* ── Subtitle — bigger ── */
    .h-sub {
      font-size: 1.1rem;
      letter-spacing: .45em;
      text-indent: .45em;
      text-transform: uppercase;
      color: #00ffff;
      text-shadow: 0 0 12px #00ffff, 0 0 28px #00ffff55;
      animation: sub-flicker 8s infinite;
    }

    @keyframes sub-flicker {
      0%, 56%, 58%, 60%, 100% { opacity: 1; text-shadow: 0 0 12px #00ffff, 0 0 28px #00ffff55; }
      57%  { opacity: 0;   }
      59%  { opacity: .5; text-shadow: 0 0 30px #00ffff; }
    }

    .h-tag {
      margin-top: 14px;
      font-size: .55rem;
      letter-spacing: .2em;
      color: #39ff1433;
      animation: tag-pulse 4s ease-in-out infinite alternate;
    }
    @keyframes tag-pulse {
      0%   { color: #39ff1422; }
      100% { color: #39ff1477; }
    }

    /* ═══════════════════════════════════════
       GALLERY
    ═══════════════════════════════════════ */
    .gallery {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 28px 100px;
      columns: 2 380px;
      column-gap: 18px;
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      margin-bottom: 18px;
      cursor: pointer;
    }

    /* Neon color + RGB channels for rgba() */
    .card:nth-child(5n+1) { --neon:#ff00ff; --nr:255; --ng:0;   --nb:255; }
    .card:nth-child(5n+2) { --neon:#00ffff; --nr:0;   --ng:255; --nb:255; }
    .card:nth-child(5n+3) { --neon:#39ff14; --nr:57;  --ng:255; --nb:20;  }
    .card:nth-child(5n+4) { --neon:#ff6600; --nr:255; --ng:102; --nb:0;   }
    .card:nth-child(5n)   { --neon:#ff0066; --nr:255; --ng:0;   --nb:102; }

    /* Static card rotations */
    .card:nth-child(4n+1) { transform: rotate(-.9deg);  }
    .card:nth-child(4n+2) { transform: rotate( .6deg);  }
    .card:nth-child(4n+3) { transform: rotate(-1.3deg); }
    .card:nth-child(4n)   { transform: rotate( .4deg);  }

    /* Inner: fade-in transition + border breathing animation once visible */
    .card-inner {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity .9s ease, transform .9s ease;
      border: 1px solid var(--neon, #ff00ff);
      box-shadow:
        0 0 5px  var(--neon, #ff00ff),
        0 0 12px rgba(var(--nr,255),var(--ng,0),var(--nb,255),.18),
        inset 0 0 6px rgba(var(--nr,255),var(--ng,0),var(--nb,255),.04);
      overflow: hidden;
      position: relative;
      background: #060606;
    }

    .card.in .card-inner {
      opacity: 1;
      transform: translateY(0);
      animation: border-breathe 4s ease-in-out infinite;
    }

    /* Stagger animation phase per card */
    .card:nth-child(5n+1).in .card-inner { animation-duration: 3.8s; animation-delay:  0s;   }
    .card:nth-child(5n+2).in .card-inner { animation-duration: 4.6s; animation-delay: -1.5s; }
    .card:nth-child(5n+3).in .card-inner { animation-duration: 3.2s; animation-delay: -2.8s; }
    .card:nth-child(5n+4).in .card-inner { animation-duration: 5.2s; animation-delay: -0.9s; }
    .card:nth-child(5n).in   .card-inner { animation-duration: 4.1s; animation-delay: -3.4s; }

    @keyframes border-breathe {
      0%, 100% {
        box-shadow:
          0 0 5px  var(--neon),
          0 0 12px rgba(var(--nr),var(--ng),var(--nb),.2),
          inset 0 0 6px rgba(var(--nr),var(--ng),var(--nb),.04);
      }
      28% {
        box-shadow:
          0 0 14px var(--neon),
          0 0 32px rgba(var(--nr),var(--ng),var(--nb),.5),
          inset 0 0 12px rgba(var(--nr),var(--ng),var(--nb),.08);
      }
      55% {
        box-shadow:
          0 0 3px  var(--neon),
          0 0 6px  rgba(var(--nr),var(--ng),var(--nb),.1);
      }
      /* Flicker-off burst */
      84% { box-shadow: none; border-color: transparent; }
      85% {
        box-shadow:
          0 0 28px var(--neon),
          0 0 65px rgba(var(--nr),var(--ng),var(--nb),.75);
        border-color: var(--neon);
      }
      86% { box-shadow: none; border-color: transparent; }
      87% {
        box-shadow:
          0 0 8px var(--neon),
          0 0 20px rgba(var(--nr),var(--ng),var(--nb),.3);
        border-color: var(--neon);
      }
    }

    /* Hover: freeze animation, explode glow */
    .card:hover .card-inner {
      animation-play-state: paused;
      box-shadow:
        0 0 18px var(--neon),
        0 0 50px rgba(var(--nr),var(--ng),var(--nb),.7),
        0 0 100px rgba(var(--nr),var(--ng),var(--nb),.35),
        inset 0 0 20px rgba(var(--nr),var(--ng),var(--nb),.1);
    }

    /* Corner brackets on card-inner */
    .card-inner::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 18px; height: 18px;
      border-top: 2px solid var(--neon, #ff00ff);
      border-left: 2px solid var(--neon, #ff00ff);
      z-index: 3; pointer-events: none;
    }
    .card-inner::after {
      content: '';
      position: absolute; bottom: 0; right: 0;
      width: 18px; height: 18px;
      border-bottom: 2px solid var(--neon, #ff00ff);
      border-right: 2px solid var(--neon, #ff00ff);
      z-index: 3; pointer-events: none;
    }

    /* ── IMAGE ── */
    .card-img { position: relative; overflow: hidden; }

    /* Base pulse — paintings breathe / wobble when visible */
    .card:nth-child(6n+1) { --px:2px;  --py:-1px; }
    .card:nth-child(6n+2) { --px:-1px; --py:2px;  }
    .card:nth-child(6n+3) { --px:1px;  --py:1px;  }
    .card:nth-child(6n+4) { --px:-2px; --py:-1px; }
    .card:nth-child(6n+5) { --px:1px;  --py:-2px; }
    .card:nth-child(6n)   { --px:-1px; --py:1px;  }

    .card.in .card-img img {
      display: block; width: 100%; height: auto;
      animation: img-pulse 5s ease-in-out infinite;
    }
    .card:nth-child(4n+2).in .card-img img { animation-duration: 6.5s; animation-delay: -2s;   }
    .card:nth-child(4n+3).in .card-img img { animation-duration: 4.2s; animation-delay: -1.5s; }
    .card:nth-child(4n).in   .card-img img { animation-duration: 7.1s; animation-delay: -3.5s; }

    @keyframes img-pulse {
      0%, 100% {
        transform: translate(0,0) scale(1);
        filter: brightness(.82) contrast(1.12) saturate(1.15);
      }
      35% {
        transform: translate(var(--px,1px), var(--py,-1px)) scale(1.012);
        filter: brightness(.88) contrast(1.14) saturate(1.22);
      }
      70% {
        transform: translate(calc(var(--px,1px) * -1), calc(var(--py,-1px) * -1)) scale(.994);
        filter: brightness(.78) contrast(1.10) saturate(1.10);
      }
    }

    /* Hover overrides pulse with full glitch (higher specificity via .in) */
    .card.in:hover .card-img img {
      animation: img-glitch .22s steps(3) infinite;
    }

    @keyframes img-glitch {
      0%   { transform: translate(0,0);       filter: brightness(1)    contrast(1.2)  saturate(1.6) hue-rotate(0deg);   }
      25%  { transform: translate(-3px,1px);  filter: brightness(1.1)  contrast(1.45) saturate(2.2) hue-rotate(25deg);  }
      50%  { transform: translate(3px,-1px);  filter: brightness(.92)  contrast(1.55) saturate(1.9) hue-rotate(-18deg); }
      75%  { transform: translate(-2px,2px);  filter: brightness(1.05) contrast(1.35) saturate(2.5) hue-rotate(12deg);  }
      100% { transform: translate(0,0);       filter: brightness(1)    contrast(1.2)  saturate(1.6) hue-rotate(0deg);   }
    }

    /* RGB split overlays on hover */
    .card-img::before,
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2;
      mix-blend-mode: screen;
      opacity: 0;
    }
    .card:hover .card-img::before {
      background: rgba(0,255,255,.15);
      opacity: 1;
      animation: rgb-l .28s steps(4) infinite;
    }
    .card:hover .card-img::after {
      background: rgba(255,0,255,.15);
      opacity: 1;
      animation: rgb-r .28s steps(4) infinite;
    }

    @keyframes rgb-l {
      0%  { transform: translateX(-5px); clip-path: inset(0  0 82% 0); }
      25% { transform: translateX(-7px); clip-path: inset(28% 0 52% 0); }
      50% { transform: translateX(-4px); clip-path: inset(63% 0 18% 0); }
      75% { transform: translateX(-6px); clip-path: inset(12% 0 70% 0); }
    }
    @keyframes rgb-r {
      0%  { transform: translateX(5px);  clip-path: inset(22% 0 62% 0); }
      25% { transform: translateX(7px);  clip-path: inset(56% 0 28% 0); }
      50% { transform: translateX(4px);  clip-path: inset(80% 0  5% 0); }
      75% { transform: translateX(6px);  clip-path: inset(42% 0 42% 0); }
    }

    /* ── CAPTION ── */
    .card-caption { padding: 13px 15px 15px; }

    .card-title {
      display: block;
      font-size: .78rem;
      color: #ccc;
      letter-spacing: .06em;
      line-height: 1.55;
    }

    .card:hover .card-title {
      animation: txt-shake .12s steps(2) infinite;
      color: #fff;
    }
    @keyframes txt-shake {
      0%  { transform: translate(0); }
      25% { transform: translate(1px,0); }
      50% { transform: translate(-1px,1px); }
      75% { transform: translate(1px,-1px); }
    }

    .card-year {
      display: inline-block;
      margin-top: 6px;
      font-size: .56rem;
      color: var(--neon, #ff00ff);
      text-shadow: 0 0 8px var(--neon, #ff00ff);
      letter-spacing: .38em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════
       LIGHTBOX
    ═══════════════════════════════════════ */
    #lb {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.97); z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column;
      padding: 60px 80px 60px;
      border: 1px solid #ff00ff1a;
    }
    #lb.open { display: flex; animation: lb-in .25s ease; }

    @keyframes lb-in {
      0%   { opacity: 0; filter: hue-rotate(180deg) brightness(4) blur(6px); }
      100% { opacity: 1; filter: none; }
    }

    #lb-wrap {
      flex: 1; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    #lb-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      border: 1px solid #ff00ff33;
      box-shadow:
        0 0 30px rgba(255,0,255,.3),
        0 0 70px rgba(0,255,255,.2),
        0 28px 80px rgba(0,0,0,.9);
      transition: opacity .2s;
    }
    #lb-img.fade { opacity: 0; }

    .lb-info { text-align: center; padding-top: 22px; flex-shrink: 0; }
    .lb-title { font-style: italic; font-size: 1rem; color: #eee; letter-spacing: .04em; }
    .lb-year {
      font-size: .6rem; color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      letter-spacing: .4em; text-transform: uppercase; margin-top: 8px;
    }

    #lb-close {
      position: fixed; top: 18px; right: 22px;
      background: none; border: 1px solid #ff00ff44; color: #ff00ff55;
      font-size: 1.6rem; cursor: pointer;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; z-index: 10;
    }
    #lb-close:hover {
      color: #ff00ff; border-color: #ff00ff;
      box-shadow: 0 0 16px #ff00ff;
      transform: rotate(90deg);
    }

    #lb-count {
      position: fixed; top: 26px; left: 50%; transform: translateX(-50%);
      font-size: .58rem; color: #39ff1444; letter-spacing: .3em;
      text-transform: uppercase;
    }

    .lb-arr {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid #222; color: #444;
      width: 46px; height: 46px; font-size: 1.5rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .lb-arr:hover {
      border-color: #00ffff; color: #00ffff;
      box-shadow: 0 0 16px #00ffff;
    }
    #lb-prev { left: 14px; }
    #lb-next { right: 14px; }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    footer {
      text-align: center;
      padding: 48px 20px 60px;
      border-top: 1px solid #ff00ff1a;
    }

    .foot-rule {
      width: 44px; height: 1px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      margin: 0 auto 22px;
      box-shadow: 0 0 12px #ff00ff77;
    }

    footer p {
      font-size: .63rem; color: #2a2a2a;
      letter-spacing: .26em; text-transform: uppercase;
    }
    footer a { color: #ff00ff44; text-decoration: none; transition: all .2s; }
    footer a:hover { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

    .foot-coords {
      margin-top: 9px;
      font-size: .48rem; color: #39ff1422; letter-spacing: .18em;
      animation: tag-pulse 5s ease-in-out infinite alternate;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .gallery { columns: 1; padding: 50px 14px 70px; }
      header   { padding: 70px 14px 50px; }
      #lb      { padding: 50px 30px 50px; }
      .lb-arr  { display: none; }
    }

    /* ── Page navigation ── */
    .page-nav {
      display: flex; justify-content: center; align-items: center; gap: 10px;
      padding: 28px 0 32px;
      border-top: 1px solid #ff00ff18;
      position: relative; z-index: 1;
    }
    .pn {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      color: #ff00ff28;
      text-decoration: none;
      transition: color .2s, filter .2s;
      border: 1px solid #ff00ff18;
    }
    .pn svg { width: 22px; height: 22px; }
    .pn:hover { color: #ff00ff; filter: drop-shadow(0 0 6px #ff00ff88); border-color: #ff00ff44; }
    .pn.pn-active {
      color: #ff00ff;
      border-color: #ff00ff44;
      filter: drop-shadow(0 0 6px #ff00ffaa);
      animation: nav-glitch .5s steps(1) infinite;
    }
    @keyframes nav-glitch {
      0%, 82%, 100% { filter: drop-shadow(0 0 6px #ff00ffaa); color: #ff00ff; }
      84%           { filter: drop-shadow(0 0 6px #00ffff88); color: #00ffff; }
      87%           { filter: none; color: #ff00ff33; }
      90%           { filter: drop-shadow(0 0 8px #ff00ff); color: #ff00ff; }
    }
  </style>
</head>
<body>

<!-- Animated film grain noise -->
<svg class="noise-svg" xmlns="http://www.w3.org/2000/svg">
  <filter id="nf">

/* ── Build gallery ── */
const gallery = document.getElementById('gallery');
const cards   = [];
data.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-img">
        <img src="${B + p.f}" alt="${p.t}" loading="lazy" decoding="async">
      </div>
      <div class="card-caption">
        <span class="card-title">${p.t}</span>
        <span class="card-year">${p.y}</span>
      </div>
    </div>`;
  card.addEventListener('click', () => openLb(i));
  gallery.appendChild(card);
  cards.push(card);
});

/* ── Scroll fade-in ── */
const io = new IntersectionObserver(entries => {
  entries.forEach((e, idx) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('in'), idx * 55);
      io.unobserve(e.target);
    }
  });
}, { threshold: .05, rootMargin: '0px 0px -30px 0px' });
cards.forEach(c => io.observe(c));

/* ── Lightbox ── */
const lb    = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbT   = document.getElementById('lb-title');
const lbY   = document.getElementById('lb-year');
const lbC   = document.getElementById('lb-count');
let cur = 0;

function lbLoad(i) {
  cur = i;
  lbImg.classList.add('fade');
  const tmp = new Image();
  tmp.onload = () => { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); };
  tmp.src = B + data[i].f;
  if (tmp.complete) { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); }
  lbT.textContent = data[i].t;
  lbY.textContent = data[i].y;
  lbC.textContent = `${i + 1} / ${data.length}`;
}
function openLb(i)  { lbLoad(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur - 1 + data.length) % data.length);
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur + 1) % data.length);
});
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  lbLoad((cur - 1 + data.length) % data.length);
  if (e.key === 'ArrowRight') lbLoad((cur + 1) % data.length);
});
