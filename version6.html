<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism — Cinema</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      background: #000; color: #fff;
      font-family: Georgia, 'Times New Roman', serif;
      user-select: none;
    }

    /* ── Two-buffer image layers ── */
    .scene { position: fixed; inset: 0; }

    .layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .9s cubic-bezier(.4,0,.2,1);
    }
    .layer.active { opacity: 1; }

    .layer img {
      max-width: 100vw; max-height: 100vh;
      object-fit: contain; display: block;
      /* very subtle desaturate at rest — lifted once title shows */
      filter: brightness(.92) saturate(.9);
      transition: filter 1.2s ease;
    }
    .layer.active img { filter: brightness(1) saturate(1); }

    /* ── Bottom gradient ── */
    .gradient {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top,
        rgba(0,0,0,.88) 0%,
        rgba(0,0,0,.4)  40%,
        transparent     80%);
      pointer-events: none; z-index: 10;
    }

    /* ── Title overlay ── */
    .title-wrap {
      position: fixed; bottom: 60px; left: 0; right: 0;
      text-align: center; z-index: 20;
      pointer-events: none;
      opacity: 0; transform: translateY(12px);
      transition: opacity .65s ease, transform .65s ease;
    }
    .title-wrap.show { opacity: 1; transform: none; }

    .cine-title {
      font-style: italic;
      font-size: clamp(1.3rem, 3.2vw, 2.4rem);
      color: #fff;
      letter-spacing: .04em;
      text-shadow: 0 2px 24px rgba(0,0,0,.7), 0 0 60px rgba(0,0,0,.5);
      line-height: 1.3;
      padding: 0 60px;
    }
    .cine-year {
      margin-top: 10px;
      font-size: .62rem; color: #c9a96e;
      letter-spacing: .4em; text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: block;
    }

    /* ── Brand + counter (top) ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px; z-index: 20; pointer-events: none;
    }
    .tb-brand {
      font-size: .72rem; letter-spacing: .44em; text-transform: uppercase;
      color: rgba(255,255,255,.18);
    }
    .tb-counter {
      font-size: .6rem; color: rgba(255,255,255,.22);
      letter-spacing: .28em; font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Click navigation zones ── */
    .zone {
      position: fixed; top: 0; bottom: 0; width: 50%; z-index: 30;
      cursor: pointer;
    }
    #zone-prev { left: 0; }
    #zone-next { right: 0; }

    /* ── Arrow hints ── */
    .arrow-hint {
      position: fixed; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.12);
      font-size: 3rem; z-index: 40;
      pointer-events: none;
      transition: color .4s, opacity .4s;
      line-height: 1;
    }
    #arr-l { left: 20px; }
    #arr-r { right: 20px; }
    #zone-prev:hover ~ #arr-l { color: rgba(255,255,255,.35); }
    #zone-next:hover ~ #arr-r { color: rgba(255,255,255,.35); }

    /* ── Thin progress bar at very bottom ── */
    .progress {
      position: fixed; bottom: 0; left: 0;
      height: 2px; background: rgba(201,169,110,.5);
      transition: width .6s cubic-bezier(.4,0,.2,1);
      z-index: 50;
    }

    /* ── Keyboard hint ── */
    .kb-hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-size: .54rem; color: rgba(255,255,255,.12);
      letter-spacing: .22em; text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      z-index: 50; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- Two image layers for cross-fade -->
<div class="scene">
  <div class="layer" id="layer-a"><img id="img-a" src="" alt=""></div>
  <div class="layer" id="layer-b"><img id="img-b" src="" alt=""></div>
</div>

<div class="gradient"></div>

<div class="title-wrap" id="title-wrap">
  <p class="cine-title" id="cine-title"></p>
  <span class="cine-year" id="cine-year"></span>
</div>

<div class="topbar">
  <span class="tb-brand">Smartism</span>

</div>

<div class="zone" id="zone-prev"></div>
<div class="zone" id="zone-next"></div>

<span class="arrow-hint" id="arr-l">&#8249;</span>
<span class="arrow-hint" id="arr-r">&#8250;</span>

<div class="progress" id="progress"></div>
<span class="kb-hint">← → navigate</span>

/* ── Two-buffer cross-fade engine ── */
const layers   = [document.getElementById('layer-a'), document.getElementById('layer-b')];
const imgs     = [document.getElementById('img-a'),   document.getElementById('img-b')];
const titleWrap = document.getElementById('title-wrap');
const cineTitle = document.getElementById('cine-title');
const cineYear  = document.getElementById('cine-year');
const counter   = document.getElementById('tb-counter');
const progress  = document.getElementById('progress');

let cur    = 0;
let active = 0;   /* which buffer is currently showing */
let busy   = false;

/* Preload helper */
function preload(src) {
  const img = new Image();
  img.src = src;
}

function updateUI(i) {
  cineTitle.textContent = data[i].t;
  cineYear.textContent  = data[i].y;
  counter.textContent   = `${String(i + 1).padStart(2, '0')} / ${String(data.length).padStart(2, '0')}`;
  progress.style.width  = `${((i + 1) / data.length) * 100}%`;
}

function show(i, instant) {
  if (busy && !instant) return;
  busy = true;
  cur  = i;

  /* hide title immediately */
  titleWrap.classList.remove('show');

  const next = 1 - active;
  const src  = B + data[i].f;

  function swap() {
    layers[next].classList.add('active');
    layers[active].classList.remove('active');
    active = next;
    updateUI(i);
    /* title fades in after image cross-fade begins */
    setTimeout(() => {
      titleWrap.classList.add('show');
      busy = false;
    }, 500);
    /* preload neighbours */
    if (data[i + 1]) preload(B + data[i + 1].f);
    if (data[i - 1]) preload(B + data[i - 1].f);
  }

  if (instant) {
    imgs[next].src = src;
    swap();
  } else {
    imgs[next].onload = swap;
    imgs[next].src    = src;
    if (imgs[next].complete) swap();
  }
}

function prev() { show((cur - 1 + data.length) % data.length); }
function next() { show((cur + 1) % data.length); }

document.getElementById('zone-prev').addEventListener('click', prev);
document.getElementById('zone-next').addEventListener('click', next);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  prev();
  if (e.key === 'ArrowRight') next();
});

/* Touch swipe */
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
  touchX = null;
});

/* Boot */
show(0, true);
</script>
