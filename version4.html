<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartism</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">
  <style>
    :root { --gold: #c9a96e; --border: #111; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html  { scroll-behavior: smooth; }
    body  { background: #000; color: #fff; font-family: Georgia, 'Times New Roman', serif; }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 110px 20px 72px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .h-name {
      font-size: clamp(2.2rem, 8.75vw, 7rem);
      font-weight: 400;
      letter-spacing: .55em;
      text-transform: uppercase;
      line-height: 1;
      text-indent: .55em;   /* optical centering vs letter-spacing */
    }
    .h-rule {
      width: 48px; height: 1px; background: var(--gold);
      margin: 32px auto 24px;
    }
    .h-sub {
      font-size: .78rem; letter-spacing: .5em; text-transform: uppercase;
      color: #666; font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Gallery – single column ── */
    .gallery {
      max-width: 820px;
      margin: 0 auto;
      padding: 90px 44px 110px;
    }

    /* ── Card ── */
    .card {
      break-inside: avoid;
      margin-bottom: 70px;
      cursor: pointer;
      /* initial state for scroll animation */
      opacity: 0;
      transform: translateY(38px);
      transition: opacity .95s cubic-bezier(.4,0,.2,1),
                  transform .95s cubic-bezier(.4,0,.2,1);
    }
    .card.in { opacity: 1; transform: none; }

    .card-img { position: relative; overflow: hidden; }
    .card-img img {
      display: block; width: 100%; height: auto;
      filter: brightness(.88) saturate(.9);
      transition: transform .85s cubic-bezier(.25,.46,.45,.94),
                  filter .65s ease;
    }
    .card:hover .card-img img {
      transform: scale(1.045);
      filter: brightness(1) saturate(1.1);
    }
    /* Subtle inner vignette that lifts on hover */
    .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.4) 100%);
      pointer-events: none;
      transition: opacity .5s ease;
    }
    .card:hover .card-img::after { opacity: 0; }

    .card-caption {
      padding: 20px 2px 0;
      margin-top: 20px;
      border-top: 1px solid #161616;
      text-align: center;
    }
    .card-title {
      font-style: italic; font-size: .95rem;
      letter-spacing: .04em; line-height: 1.45;
      color: #d8d8d8;
    }
    .card-year {
      display: block;
      margin-top: 6px;
      font-size: .58rem; color: var(--gold);
      letter-spacing: .32em; text-transform: uppercase;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Lightbox ── */
    #lb {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.98); z-index: 600;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 60px 72px 68px;
    }
    #lb.open { display: flex; }
    #lb-wrap {
      flex: 1; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #lb-img {
      max-width: 100%; max-height: 100%; object-fit: contain; display: block;
      box-shadow: 0 32px 90px rgba(0,0,0,.9);
      transition: opacity .2s;
    }
    #lb-img.fade { opacity: 0; }
    .lb-info { text-align: center; padding-top: 22px; flex-shrink: 0; }
    .lb-title { font-style: italic; font-size: 1.05rem; color: #e0e0e0; }
    .lb-year  {
      font-size: .62rem; color: var(--gold); letter-spacing: .3em;
      text-transform: uppercase; margin-top: 7px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    #lb-close {
      position: fixed; top: 18px; right: 22px;
      background: none; border: none; color: #333;
      font-size: 2rem; cursor: pointer;
      transition: color .2s, transform .2s; z-index: 10;
    }
    #lb-close:hover { color: #fff; transform: rotate(90deg); }
    #lb-count {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      font-size: .62rem; color: #2e2e2e; letter-spacing: .3em;
      font-family: sans-serif; text-transform: uppercase;
    }
    .lb-arr {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid #1c1c1c; color: #333;
      width: 46px; height: 46px; font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .lb-arr:hover { border-color: var(--gold); color: var(--gold); }
    #lb-prev { left: 14px; }
    #lb-next { right: 14px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 52px 20px 64px;
      border-top: 1px solid var(--border);
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .foot-rule { width: 36px; height: 1px; background: var(--gold); margin: 0 auto 22px; }
    footer p { font-size: .66rem; color: #2e2e2e; letter-spacing: .28em; text-transform: uppercase; }
    footer a  { color: var(--gold); text-decoration: none; }

    @media (max-width: 680px) {
      .gallery { columns: 1; padding: 50px 20px 70px; }
      header   { padding: 72px 20px 52px; }
    }

    /* ── Page navigation ── */
    .page-nav {
      display: flex; justify-content: center; align-items: center; gap: 8px;
      padding: 32px 0 36px;
      border-bottom: 1px solid #111;
    }
    .pn {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      color: #272727;
      text-decoration: none;
      transition: color .25s;
      border: 1px solid #151515;
    }
    .pn svg { width: 22px; height: 22px; }
    .pn:hover { color: #555; border-color: #333; }
    .pn.pn-active { color: var(--gold); border-color: #2a2218; }

    /* ── Secret rune button ── */
    .rune-gate {
      display: flex; justify-content: flex-end;
      padding: 0 18px 14px;
    }
    .rune-btn {
      background: none; border: none; cursor: pointer;
      color: #8b2010;
      line-height: 1; padding: 8px;
      transition: color .6s, filter .6s, transform .4s;
      filter: drop-shadow(0 0 4px rgba(200,50,10,.4))
             drop-shadow(0 0 10px rgba(180,30,5,.2));
      animation: rune-pulse 3s ease-in-out infinite;
    }
    @keyframes rune-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(200,50,10,.4)) drop-shadow(0 0 10px rgba(180,30,5,.2)); }
      50%      { filter: drop-shadow(0 0 6px rgba(220,60,10,.55)) drop-shadow(0 0 16px rgba(200,40,5,.3)); }
    }
    .rune-btn:hover {
      color: #c43a1a;
      filter: drop-shadow(0 0 10px rgba(240,70,15,.7))
             drop-shadow(0 0 28px rgba(220,45,10,.4))
             drop-shadow(0 0 48px rgba(180,25,5,.2));
      transform: scale(1.2);
      animation: none;
    }
    .rune-btn:active { transform: scale(.92); }

    /* ── Win95 dialog ── */
    .w95-overlay {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.55);
      align-items: center; justify-content: center;
    }
    .w95-overlay.open { display: flex; }

    .w95-box {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #000;
      border-bottom: 2px solid #000;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
      font-family: 'MS Sans Serif', 'Arial', sans-serif;
      min-width: 340px; max-width: 92vw;
      padding: 3px;
    }

    .w95-titlebar {
      background: #000080;
      color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 3px 5px 3px 6px;
      display: flex; justify-content: space-between; align-items: center;
      letter-spacing: .02em;
      user-select: none;
    }
    .w95-close {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #000;
      border-bottom: 2px solid #000;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
      font-size: 10px; font-weight: 700; font-family: inherit;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #000; line-height: 1; padding: 0;
    }
    .w95-close:active {
      border-top: 2px solid #000;
      border-left: 2px solid #000;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf;
    }

    .w95-body {
      display: flex; align-items: flex-start; gap: 18px;
      padding: 22px 24px 12px 18px;
    }
    .w95-icon {
      flex-shrink: 0; width: 32px; height: 32px;
    }
    .w95-msg {
      font-size: 12px; color: #000; line-height: 1.45;
      padding-top: 4px;
    }

    .w95-actions {
      display: flex; justify-content: center; gap: 10px;
      padding: 6px 18px 16px;
    }
    .w95-btn {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #000;
      border-bottom: 2px solid #000;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
      font-family: 'MS Sans Serif', 'Arial', sans-serif;
      font-size: 12px; color: #000;
      padding: 5px 22px; min-width: 96px;
      cursor: pointer; text-align: center;
      position: relative;
    }
    .w95-btn::after {
      content: '';
      position: absolute; inset: 3px;
      border: 1px dotted #000;
      pointer-events: none;
      opacity: 0;
    }
    .w95-btn:focus-visible::after,
    .w95-btn:focus::after { opacity: 1; }
    .w95-btn:active {
      border-top: 2px solid #000;
      border-left: 2px solid #000;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf;
      padding: 6px 21px 4px 23px;
    }
  </style>
</head>

<script>
const B = 'images/';
const data = [
  {y:2017,t:'CT16',                                                                    f:'img-20170929-195624-198_orig.jpg'},
  {y:2017,t:'Rag',                                                                     f:'img-20170714-090208-885_orig.jpg'},

  {y:2016,t:'Unknown Equivalent',                                                      f:'1479395060.png'},
  {y:2016,t:'Drinkende Man bij Molen tijdens Heldere Nacht',                           f:'20161109-223057_orig.jpg'},

  {y:2016,t:'Punanti Punani',                                                          f:'1475503104.png'},
  {y:2016,t:'Appealing Afterglow in Perpendicular Apocalypse',                         f:'1476974852.png'},
  {y:2016,t:'Composition B-166ER',                                                     f:'1475067705.png'},
  {y:2016,t:'Gutting of the Soul / Sweet Bliss in Unexpected Joyfull Triumph',         f:'1475503590.png'},

  {y:2016,t:'Ratsmodee',                                                               f:'20160912-232146-m_orig.jpg'},

  {y:2011,t:'Love is a Four Letter Word',                                              f:'7820743_orig.jpg'},
  {y:2010,t:"L'art Poer L'art",                                                        f:'1475068071.png'},
  {y:2010,t:'Komorebi',                                                                f:'1478861399.png'},
  {y:2008,t:'Bolletje Beschuitweken',                                                  f:'1475068108.png'},
];

/* ── Build gallery ── */
const gallery = document.getElementById('gallery');
const cards   = [];
data.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-img">
      <img src="${B + p.f}" alt="${p.t}" loading="lazy" decoding="async">
    </div>
    <div class="card-caption">
      <span class="card-title">${p.t}</span>
      <span class="card-year">${p.y}</span>
    </div>`;
  card.addEventListener('click', () => openLb(i));
  gallery.appendChild(card);
  cards.push(card);
});

/* ── Scroll fade-in ── */
const io = new IntersectionObserver(entries => {
  entries.forEach((e, idx) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('in'), idx * 55);
      io.unobserve(e.target);
    }
  });
}, { threshold: .06, rootMargin: '0px 0px -40px 0px' });
cards.forEach(c => io.observe(c));

/* ── Lightbox ── */
const lb    = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbT   = document.getElementById('lb-title');
const lbY   = document.getElementById('lb-year');
const lbC   = document.getElementById('lb-count');
let cur = 0;

function lbLoad(i) {
  cur = i;
  lbImg.classList.add('fade');
  const tmp = new Image();
  tmp.onload = () => { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); };
  tmp.src = B + data[i].f;
  if (tmp.complete) { lbImg.src = B + data[i].f; lbImg.classList.remove('fade'); }
  lbT.textContent = data[i].t;
  lbY.textContent = data[i].y;
  lbC.textContent = `${i + 1} / ${data.length}`;
}
function openLb(i) { lbLoad(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur - 1 + data.length) % data.length);
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation(); lbLoad((cur + 1) % data.length);
});
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  lbLoad((cur - 1 + data.length) % data.length);
  if (e.key === 'ArrowRight') lbLoad((cur + 1) % data.length);
});

/* ── Secret gate / Win95 dialog ── */
const w95 = document.getElementById('w95');
document.getElementById('rune-btn').addEventListener('click', () => w95.classList.add('open'));
document.getElementById('w95-close').addEventListener('click', () => w95.classList.remove('open'));
w95.addEventListener('click', e => { if (e.target === w95) w95.classList.remove('open'); });

document.getElementById('w95-show').addEventListener('click', () => {
  w95.classList.remove('open');
  document.body.style.transition = 'filter 1.2s ease';
  document.body.style.filter = 'invert(1) hue-rotate(180deg)';
  setTimeout(() => { document.body.style.filter = ''; }, 2400);
});
document.getElementById('w95-dawg').addEventListener('click', () => {
  w95.classList.remove('open');
  document.querySelector('.h-name').style.transition = 'letter-spacing .8s, transform .8s';
  document.querySelector('.h-name').style.letterSpacing = '1.5em';
  document.querySelector('.h-name').style.transform = 'scale(1.08)';
  setTimeout(() => {
    document.querySelector('.h-name').style.letterSpacing = '';
    document.querySelector('.h-name').style.transform = '';
  }, 2000);
});
document.addEventListener('keydown', e => {
  if (w95.classList.contains('open') && e.key === 'Escape') w95.classList.remove('open');
});
</script>
</body>
